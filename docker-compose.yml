  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./PaddleOCR-VL-1.6_Online_Demo/examples:/usr/share/nginx/html/examples:ro
    ports:
      - "${PORT}:80"
    depends_on:
      - paddle-ocr-demo
      - admin-panel
    restart: unless-stopped

  admin-panel:
    build:
      context: .
      target: pipeline-api
    environment:
      - PIPELINE_HOST=0.0.0.0
      - PIPELINE_PORT=8000
      - ADMIN_USER
      - ADMIN_PASS
      - CUDA_VISIBLE_DEVICES=${CUDA_VISIBLE_DEVICES:-0,1}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./:/workspace
    pid: "host"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    command: ["/app/.venv-api/bin/python", "/workspace/scripts/admin_panel.py"]
