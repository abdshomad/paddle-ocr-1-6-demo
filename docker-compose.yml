x-vllm-template: &vllm-template
  build:
    context: .
    target: vllm-server
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: all
            capabilities: [gpu]
  volumes:
    - ${HOME}/.cache/huggingface:/root/.cache/huggingface
    - ${HOME}/.paddleocr:/root/.paddleocr
    - ${HOME}/.paddlex:/root/.paddlex
    - ./config:/app/config
    - ./.env:/app/.env:ro
  restart: unless-stopped

x-pipeline-template: &pipeline-template
  build:
    context: .
    target: pipeline-api
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: all
            capabilities: [gpu]
  volumes:
    - ${HOME}/.paddleocr:/root/.paddleocr
    - ${HOME}/.paddlex:/root/.paddlex
    - ./config:/app/config
    - ./.env:/app/.env:ro
  restart: unless-stopped

services:
  paddle-ocr-demo:
    build:
      context: .
      target: gradio-ui
    environment:
      - GRADIO_SERVER_PORT=7860
      - GRADIO_SERVER_NAME=0.0.0.0
      - BOS_URL=examples
      - GRADIO_ALLOWED_PATHS=/app/PaddleOCR-VL-1.6_Online_Demo
      - API_URL=http://nginx/layout-parsing
    depends_on:
      - pipeline-api-gpu0
      - pipeline-api-gpu1
      - pipeline-api-gpu2
      - pipeline-api-gpu3
      - pipeline-api-gpu4
      - pipeline-api-gpu5
      - pipeline-api-gpu6
      - pipeline-api-gpu7

  vllm-server-gpu0:
    <<: *vllm-template
    environment:
      - GENAI_HOST=0.0.0.0
      - GENAI_PORT=8118
      - GENAI_MODEL=${GENAI_MODEL:-PaddleOCR-VL-1.6-0.9B}
      - GENAI_BACKEND=${GENAI_BACKEND:-vllm}
      - VLLM_CONFIG=${VLLM_CONFIG:-config/vllm_config.yaml}
      - INSTANCE_GPU=0
      - PADDLE_PDX_DISABLE_MODEL_SOURCE_CHECK=True

  vllm-server-gpu1:
